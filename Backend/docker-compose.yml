# Local development only. Do NOT use these values, or this file, to run the
# app with NODE_ENV=production - src/config/index.ts refuses to start in
# production unless real secrets and infrastructure URLs are supplied via the
# environment (see README.md "Configuration" section).
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - APP_MODE=api
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:vaulty_password@postgres:5432/vaulty}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-only-access-secret-not-for-production-use}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-only-refresh-secret-not-for-production-use}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CORS_ORIGIN=http://localhost:3000
      - STELLAR_NETWORK=testnet
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - ANCHOR_WEBHOOK_SECRET=dev-webhook-secret
      - ANCHOR_API_KEY=dev-api-key
      - ANCHOR_BASE_URL=https://api.anchor.test
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - vaulty-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - APP_MODE=worker
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:vaulty_password@postgres:5432/vaulty}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-only-access-secret-not-for-production-use}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-only-refresh-secret-not-for-production-use}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CORS_ORIGIN=http://localhost:3000
      - STELLAR_NETWORK=testnet
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - ANCHOR_WEBHOOK_SECRET=dev-webhook-secret
      - ANCHOR_API_KEY=dev-api-key
      - ANCHOR_BASE_URL=https://api.anchor.test
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --worker
    networks:
      - vaulty-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vaulty_password
      - POSTGRES_DB=vaulty
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vaulty-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vaulty-network

volumes:
  postgres-data:
  redis-data:

networks:
  vaulty-network:
    driver: bridge
